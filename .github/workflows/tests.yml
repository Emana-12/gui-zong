name: Project Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Import and validate project
        run: |
          cd src
          xvfb-run godot --headless --import 2>&1 || true
          echo "Project import completed"

      - name: Verify scene files
        run: |
          errors=0
          for f in $(find src/ -name "*.tscn" -type f); do
            if ! head -1 "$f" | grep -q "gd_scene"; then
              echo "INVALID: $f"
              errors=$((errors + 1))
            fi
          done
          echo "Scenes: $(find src/ -name '*.tscn' | wc -l) checked, $errors errors"
          if [ $errors -gt 0 ]; then exit 1; fi

      - name: Project summary
        run: |
          echo "GDScript files: $(find src/ -name '*.gd' | wc -l)"
          echo "Shader files: $(find src/ -name '*.gdshader' | wc -l)"
          echo "Test files: $(find tests/ -name '*.gd' | wc -l)"
          echo "GDD files: $(find design/gdd/ -name '*.md' | wc -l)"
          echo "Validation passed"
