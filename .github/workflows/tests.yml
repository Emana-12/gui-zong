name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run GdUnit4 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2

      - name: Import project
        run: |
          cd src
          godot --headless --import 2>&1 || true

      - name: Run GdUnit4 Tests
        run: |
          cd src
          chmod +x addons/gdUnit4/runtest.sh
          GODOT_BIN=$(which godot) bash addons/gdUnit4/runtest.sh -a tests/unit -a tests/integration -rd reports 2>&1

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/reports/
        continue-on-error: true
