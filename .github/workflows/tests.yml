name: Automated Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run GdUnit4 Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2

      - name: Verify Godot
        run: godot --version

      - name: Import project
        run: |
          cd src
          godot --headless --import 2>&1 || true

      - name: Run tests
        run: |
          cd src
          godot --headless --script addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --add "tests/unit" \
            --add "tests/integration" \
            --report-directory reports \
            --report-name test-results 2>&1
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/reports/
        continue-on-error: true
