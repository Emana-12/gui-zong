name: Project Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2

      - name: Import project
        run: |
          cd src
          timeout 60 godot --headless --import 2>&1 || true
          echo "Import step completed"

      - name: Verify scene format
        run: |
          errors=0
          for f in $(find src/ -name "*.tscn" -type f); do
            if ! head -1 "$f" | grep -q "gd_scene"; then
              echo "INVALID: $f"
              errors=$((errors + 1))
            fi
          done
          echo "Scenes checked: $(find src/ -name '*.tscn' | wc -l), Errors: $errors"
          if [ $errors -gt 0 ]; then exit 1; fi

      - name: Verify script files
        run: |
          echo "GDScript files: $(find src/ -name '*.gd' | wc -l)"
          echo "Shader files: $(find src/ -name '*.gdshader' | wc -l)"
          echo "Test files: $(find tests/ -name '*.gd' | wc -l)"
          echo "Project validation passed"
